
{% extends "base.html" %}

{% block title %}Generation in Progress...{% endblock %}

{% block content %}
<div class="bg-white shadow-md rounded-lg p-8 max-w-2xl mx-auto">
    <div class="flex flex-col items-center">
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">Generation in Progress</h2>
        <p class="text-gray-600 mb-6">Your new template is being generated. This page will automatically update.</p>

        <div 
            id="task-status-container"
            hx-get="{{ url_for('get_task_status', task_id=task.id) }}" 
            hx-trigger="every 2s"
            hx-swap="innerHTML"
            >
            <!-- Initial Status -->
           {% include "fragments/task_status.html" %}
        </div>
    </div>
</div>
{% endblock %}
