
{% extends "web/base.html" %}

{% block title %}Generate New Template - Karria{% endblock %}

{% block content %}
<div class="container mx-auto max-w-2xl">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Generate a New Template</h1>

    <div class="bg-white p-8 rounded-lg shadow-md">
        <form action="{{ url_for('start_generation') }}"
              method="post"
              enctype="multipart/form-data"
              hx-post="{{ url_for('start_generation') }}"
              hx-encoding="multipart/form-data"
              hx-target="body"
              hx-swap="outerHTML">

            <div class="mb-6">
                <label for="cv_pdf" class="block text-sm font-medium text-gray-700 mb-2">CV (PDF format)</label>
                <input type="file"
                       name="cv_pdf"
                       id="cv_pdf"
                       required
                       class="w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 focus:outline-none">
                <p class="mt-1 text-xs text-gray-500">This PDF will be analyzed to create the template.</p>
            </div>

            <div class="mb-6">
                <label for="lm_pdf" class="block text-sm font-medium text-gray-700 mb-2">Cover Letter (Optional)</label>
                <input type="file"
                       name="lm_pdf"
                       id="lm_pdf"
                       class="w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 focus:outline-none">
                <p class="mt-1 text-xs text-gray-500">Optional cover letter to associate with the CV.</p>
            </div>

            <div class="flex items-center justify-end">
                <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                    <span class="htmx-indicator">
                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    <span>Start Generation</span>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
