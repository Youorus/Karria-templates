
{# This is an HTMX fragment, not a full HTML page. #}

{% if task.status == 'in_progress' or task.status == 'pending' %}
<div class="flex items-center justify-center p-4 bg-gray-200 rounded-lg"
     hx-get="{{ url_for('generation_status_update', task_id=task.id) }}"
     hx-trigger="load delay:2s"
     hx-swap="outerHTML">
    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-gray-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <span class="font-medium">{{ task.status }}...</span>
</div>
{% elif task.status == 'completed' %}
<div class="p-4 bg-green-100 text-green-700 rounded-lg font-bold">
    Generation Complete! Redirecting...
</div>
{% elif task.status == 'failed' %}
<div class="p-4 bg-red-100 text-red-700 rounded-lg">
    <p class="font-bold">Generation Failed</p>
    <p class="text-sm">{{ task.error }}</p>
</div>
{% endif %}
