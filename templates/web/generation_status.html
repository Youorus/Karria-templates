
{% extends "web/base.html" %}

{% block title %}Generation Status - Karria{% endblock %}

{% block content %}
<div class="container mx-auto max-w-2xl text-center">
    <h1 class="text-3xl font-bold text-gray-800 mb-4">Generation In Progress</h1>
    <p class="text-gray-600 mb-8">Your template is being generated. This may take a moment. Please wait.</p>

    <div id="status-container"
         hx-get="{{ url_for('generation_status_update', task_id=task_id) }}"
         hx-trigger="load delay:1s"
         hx-swap="innerHTML">
        <!-- Initial Status -->
        <div class="flex items-center justify-center p-4 bg-gray-200 rounded-lg">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-gray-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="font-medium">pending...</span>
        </div>
    </div>
</div>
{% endblock %}
